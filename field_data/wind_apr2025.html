<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #141c2b; font-family: 'Open Sans', sans-serif; }
#wind-map { height: 480px; width: 100%; }
#scrubber-box {
  background: #141c2b; padding: 10px 16px 14px;
}
#scrubber-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
#ts-label { font-size: 11px; color: rgba(100,180,210,0.6); letter-spacing: 1px; text-transform: uppercase; }
#ts-display {
  font-size: 13px; font-weight: 700; color: #7ec8e3;
  font-variant-numeric: tabular-nums; letter-spacing: 0.4px; margin-top: 2px;
}
#wind-slider { width: 100%; cursor: pointer; accent-color: #4fc3f7; margin-top: 4px; }
.sst-legend {
  background: rgba(15,20,35,0.82);
  border-radius: 6px;
  padding: 8px 10px;
  color: #e0e8f0;
  font-family: sans-serif;
  font-size: 11px;
  min-width: 130px;
  backdrop-filter: blur(4px);
}
.sst-legend-title {
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 5px; font-size: 10px; color: #a0c4d8;
}
.sst-bar {
  height: 10px; border-radius: 3px;
  background: linear-gradient(to right, #29186b, #0f5b90, #3b9387, #7acb66, #fdee99);
  margin-bottom: 4px; position: relative;
}
.sst-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: #c0d4e0; }
#sst-ind {
  display: none; position: absolute; top: -3px;
  width: 2px; height: 16px; background: white;
  transform: translateX(-50%);
}
#sst-temp-lbl {
  position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: white; white-space: nowrap;
  background: rgba(0,0,0,0.55); border-radius: 3px; padding: 1px 4px;
}
.layer-toggles { display: flex; gap: 6px; }
.layer-btn {
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  padding: 3px 10px; border-radius: 20px; border: none; cursor: pointer;
  background: rgba(100,180,210,0.15); color: rgba(100,180,210,0.6);
  transition: all 0.2s;
}
.layer-btn.active { background: rgba(100,180,210,0.35); color: #7ec8e3; }
</style>
</head>

// ── colour → temperature ──────────────────────────────────────────────────────
function colorToTemp(r,g,b) {
  let best=0, bestD=1e9;
  for(let i=0;i<LUT.length;i++){
    const d=(r-LUT[i][0])**2+(g-LUT[i][1])**2+(b-LUT[i][2])**2;
    if(d<bestD){bestD=d;best=i;}
  }
  return VMIN + best*(VMAX-VMIN)/255;
}

// ── makeVData ─────────────────────────────────────────────────────────────────
function makeVData(f) {
  return [
    {header: Object.assign({parameterCategory:2,parameterNumber:2}, HDR), data: f.u},
    {header: Object.assign({parameterCategory:2,parameterNumber:3}, HDR), data: f.v},
  ];
}

// ── Off-screen canvas for pixel→temp ─────────────────────────────────────────
const sstCanvas = document.createElement('canvas');
const sstCtx    = sstCanvas.getContext('2d',{willReadFrequently:true});
let sstCanvasReady = false;
function loadSSTCanvas(src){
  sstCanvasReady = false;
  const img = new Image();
  img.onload = ()=>{
    sstCanvas.width=img.naturalWidth; sstCanvas.height=img.naturalHeight;
    sstCtx.drawImage(img,0,0); sstCanvasReady=true;
  };
  img.src = src;
}

// ── Colorbar indicator ────────────────────────────────────────────────────────
const sstInd = document.getElementById('sst-ind');
const sstLbl = document.getElementById('sst-temp-lbl');
function showTempIndicator(temp){
  if(!sstInd)return;
  sstInd.style.display='block';
  sstInd.style.left=Math.max(0,Math.min(100,(temp-VMIN)/(VMAX-VMIN)*100))+'%';
  sstLbl.textContent=temp.toFixed(1)+'°C';
}
function clearTempIndicator(){if(sstInd)sstInd.style.display='none';}

// ── Mouse → SST temperature ───────────────────────────────────────────────────
map.on('mousemove',(e)=>{
  if(!sstCanvasReady){clearTempIndicator();return;}
  const[[la0,lo0],[la1,lo1]]=SST_BOUNDS;
  const px=Math.round((e.latlng.lng-lo0)/(lo1-lo0)*(sstCanvas.width-1));
  const py=Math.round((la1-e.latlng.lat)/(la1-la0)*(sstCanvas.height-1));
  if(px<0||px>=sstCanvas.width||py<0||py>=sstCanvas.height){clearTempIndicator();return;}
  const d=sstCtx.getImageData(px,py,1,1).data;
  if(d[3]<10){clearTempIndicator();return;}
  showTempIndicator(colorToTemp(d[0],d[1],d[2]));
});
map.on('mouseout',clearTempIndicator);

// ── Layer toggles ─────────────────────────────────────────────────────────────
function toggleSST(btn){
  if(map.hasLayer(sstOverlay)){map.removeLayer(sstOverlay);btn.classList.remove('active');}
  else{map.addLayer(sstOverlay);btn.classList.add('active');}
}
function toggleWind(btn){
  if(map.hasLayer(velLayer)){map.removeLayer(velLayer);btn.classList.remove('active');}
  else{map.addLayer(velLayer);btn.classList.add('active');}
}

    "#1a9ecc","#1ab5b0","#1fc48a","#55cc40","#a8d91a",
    "#e8e81a","#f5c41a","#f5901a","#f05c14","#d92020",
    "#a01515","#6b0a0a"
  ],
  particleAge: 90, lineWidth: 1.6,
  particleMultiplier: 1/300, velocityScale: 0.008,
}).addTo(map);

// ── Scrubber ──────────────────────────────────────────────────────────────────
const slider = document.getElementById('wind-slider');
const tsDsp  = document.getElementById('ts-display');

function showFrame(i){
  tsDsp.textContent = FRAMES[i].ts.replace('T',' · ').replace('Z',' UTC');
  const _d = FRAMES[i].ts.slice(0,10);
  if(SST_IMGS[_d]){ sstOverlay.setUrl(SST_IMGS[_d]); loadSSTCanvas(SST_IMGS[_d]); }
  velLayer.setData(makeVData(FRAMES[i]));
}

slider.oninput = e => showFrame(parseInt(e.target.value));
showFrame(0);
loadSSTCanvas(SST_IMGS[FRAMES[0].ts.slice(0,10)]);
</script>
</body>
</html>
